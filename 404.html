<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page introuvable — DASKA</title>
  <meta name="description" content="La page que vous recherchez n'existe pas ou a été déplacée.">
  <style>
    :root {
      --bg: #0b0d12; --surface: #13161f; --surface2: #1a1d28;
      --border: rgba(255,255,255,.07); --text: #e8eaf0;
      --muted: #7a7f96; --accent: #c8e030; --orange: #e87f24;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px; line-height: 1.75; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,13,18,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; gap: 12px; height: 60px;
    }
    .logo-mark { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-mark span { font-size:18px; font-weight:700; letter-spacing:-.5px; color:var(--text); }
    .nav-back { margin-left:auto; color:var(--muted); text-decoration:none; font-size:13px; transition:color .2s; }
    .nav-back:hover { color:var(--accent); }

    /* 404 Hero */
    .hero-404 {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 24px; text-align: center;
      background: linear-gradient(135deg, #0b0d12 0%, #13161f 100%);
    }
    .error-code {
      font-size: clamp(64px, 15vw, 160px); font-weight: 900; letter-spacing: -.02em;
      background: linear-gradient(135deg, #c8e030, #e87f24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 24px; line-height: 1;
    }
    .error-title {
      font-size: clamp(20px, 4vw, 36px); font-weight: 700; letter-spacing: -.5px;
      margin-bottom: 16px; color: var(--text);
    }
    .error-subtitle {
      font-size: 16px; color: var(--muted); margin-bottom: 48px; max-width: 520px;
      opacity: .85; line-height: 1.6;
    }

    /* Button styles */
    .button-group {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      padding: 12px 32px; border-radius: 8px; font-size: 15px; font-weight: 600;
      text-decoration: none; transition: all .2s;
      border: none; cursor: pointer;
    }
    .btn-primary {
      background: var(--orange); color: #fff;
    }
    .btn-primary:hover {
      background: #ff5722; transform: translateY(-2px);
    }
    .btn-ghost {
      border: 1px solid var(--border); color: var(--text);
      background: transparent;
    }
    .btn-ghost:hover {
      border-color: var(--accent); color: var(--accent);
      background: rgba(200,224,48,.05);
    }

    footer {
      border-top: 1px solid var(--border); padding: 32px 24px;
      text-align: center; color: var(--muted); font-size: 12px;
      margin-top: auto;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
    .footer-links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo-mark">
    <svg viewBox="8 8 84 84" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:36px;height:36px;"><defs><linearGradient id="lg" x1="11" y1="11" x2="89" y2="89" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#c8e030"/><stop offset="100%" stop-color="#e87f24"/></linearGradient></defs><path d="M28.1,11.1 A14,14 0 0,1 47.9,11.1 L64.9,28.1 A14,14 0 0,1 64.9,47.9 L47.9,64.9 A14,14 0 0,1 28.1,64.9 L11.1,47.9 A14,14 0 0,1 11.1,28.1 Z" stroke="url(#lg)" stroke-width="6.5" stroke-linecap="round" fill="none"/><path d="M52.1,35.1 A14,14 0 0,1 71.9,35.1 L88.9,52.1 A14,14 0 0,1 88.9,71.9 L71.9,88.9 A14,14 0 0,1 52.1,88.9 L35.1,71.9 A14,14 0 0,1 35.1,52.1 Z" stroke="url(#lg)" stroke-width="6.5" stroke-linecap="round" fill="none"/><path d="M67.8,32.2 A14,14 0 0,1 64.9,47.9 L47.9,64.9 A14,14 0 0,1 32.2,67.8" stroke="url(#lg)" stroke-width="6.5" stroke-linecap="round" fill="none"/></svg>
    <span>DASKA</span>
  </a>
  <a href="index.html" class="nav-back">← Retour au site</a>
</nav>

<div class="hero-404">
  <div class="error-code">404</div>
  <h1 class="error-title">Page introuvable</h1>
  <p class="error-subtitle">Cette page n'existe pas ou a été déplacée.</p>
  <div class="button-group">
    <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
    <a href="index.html" class="btn btn-ghost">Lancer un diagnostic</a>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="cgu.html">Conditions générales d'utilisation</a>
    <a href="confidentialite.html">Protection des données</a>
    <a href="index.html">Retour au site</a>
  </div>
  <p>&copy; 2026 ALPHA LEGAL — DASKA. Tous droits réservés.</p>
</footer>
</body>
</html>
